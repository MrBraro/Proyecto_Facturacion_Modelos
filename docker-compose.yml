services:

  postgres:
    image: postgres:16-alpine
    container_name: facturacion-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: facturacion_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: cesr1311
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql  # Auto-ejecuta el DDL
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d facturacion_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: facturacion-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: